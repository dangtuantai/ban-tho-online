<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8f5d32"/>
      <stop offset="1" stop-color="#5a3517"/>
    </linearGradient>
    <pattern id="plank" width="120" height="600" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="600" stroke="#3f2408" stroke-width="3" opacity=".5"/>
      <path d="M60 0 C50 150 74 300 58 450 C52 520 62 560 60 600" stroke="#4a2c0e" stroke-width="1.6" fill="none" opacity=".35"/>
      <path d="M28 0 C36 180 20 340 30 600" stroke="#4a2c0e" stroke-width="1.2" fill="none" opacity=".3"/>
      <path d="M94 0 C88 200 102 400 92 600" stroke="#4a2c0e" stroke-width="1.2" fill="none" opacity=".3"/>
      <ellipse cx="60" cy="230" rx="7" ry="16" fill="none" stroke="#4a2c0e" stroke-width="1.4" opacity=".3"/>
    </pattern>
    <linearGradient id="shelfG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3c2008"/>
      <stop offset="1" stop-color="#221003"/>
    </linearGradient>
  </defs>

  <!-- tường ván gỗ hương -->
  <rect width="960" height="600" fill="url(#wood)"/>
  <rect width="960" height="600" fill="url(#plank)"/>
  <!-- ám sáng nhẹ ở giữa -->
  <ellipse cx="480" cy="220" rx="460" ry="240" fill="#ffd9a0" opacity=".05"/>

  <!-- kệ gỗ đậm -->
  <rect y="456" width="960" height="14" fill="#6d4520"/>
  <line x1="0" y1="456" x2="960" y2="456" stroke="#2a1503" stroke-width="2" opacity=".6"/>
  <rect y="470" width="960" height="130" fill="url(#shelfG)"/>
  <!-- vân gỗ mặt kệ -->
  <g stroke="#150a01" fill="none" opacity=".3">
    <path d="M0 500 q240 -8 480 0 t480 0" stroke-width="1.6"/>
    <path d="M0 540 q320 8 640 0 t320 4" stroke-width="1.4"/>
    <path d="M0 575 q240 -6 480 0 t480 0" stroke-width="1.2"/>
  </g>
</svg>
