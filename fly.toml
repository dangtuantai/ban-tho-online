# Cấu hình Fly.io. Đổi "app" thành tên duy nhất của bạn trước khi deploy.
app = "ban-tho-online"
primary_region = "sin" # Singapore - gần Việt Nam

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
